<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Scientific Overlay Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Full app container */
        #app-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Maximized Full Screen State */
        #app-container.maximized {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            background-color: #000000;
        }

        .calculator-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 8px;
            color: #ffffff;
            justify-content: space-between;
        }

        #app-container.minimized .calculator-wrapper {
            display: none;
        }

        /* Top Bar Widgets */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 4px;
            height: 50px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 16px;
        }

        /* تهيئة أيقونة الـ SVG داخل الزر العلوي الصغير لتوحيد الهوية الاستايل */
        .header-btn svg {
            width: 22px;
            height: 22px;
        }

        .header-btn:active {
            background-color: #2c2c2e;
        }

        /* Display Screen adjusted for mobile heights */
        .display-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px;
            text-align: right;
            direction: ltr;
            max-height: 25vh;
        }

        .expression {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: 300;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* 6-Column Grid Optimized to dynamic viewport height */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            padding-bottom: 5px;
            height: 65vh;
        }

        .btn {
            border: none;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            width: 100%;
            height: 100%;
            transition: background-color 0.1s;
        }

        .btn:active {
            filter: brightness(1.4);
        }

        .btn-sci {
            background-color: #121212;
            border: 1px solid #1c1c1e;
            color: #d1d1d6;
        }

        .btn-action {
            background-color: #3a3a3c;
            font-size: 1rem;
        }

        .btn-num {
            background-color: #1c1c1e;
            font-size: 1.2rem;
        }

        .btn-op {
            background-color: #ff9f0a;
            font-size: 1.3rem;
        }

        .span-3 {
            grid-column: span 3;
        }

        /* تعديل حاوية التصغير لاستيعاب أيقونة الـ SVG بالكامل */
        #app-container.minimized {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: transparent;
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            top: 80px;
            left: 20px;
            touch-action: none;
        }

        .floating-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }

        #app-container.minimized .floating-icon {
            display: flex;
        }

        /* إجبار الـ SVG على ملء الدائرة العائمة بكفاءة ونعومة */
        #app-container.minimized .floating-icon svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="app-container" class="maximized">
        
        <!-- هنا تم استبدال الـ إيموجي القديم بكود الـ SVG ليعمل كأيقونة الزر العائم الحقيقي وبحجم مرن بنسبة 100% -->
        <div class="floating-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <circle cx="256" cy="256" r="240" fill="#1C1C1E" stroke="#2C2C2E" stroke-width="8"/>
              <circle cx="256" cy="256" r="180" fill="#252528" />
              <g transform="translate(146, 146)" stroke="#FF9F0A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
                <rect x="0" y="0" width="220" height="220" rx="30" fill="none" stroke="#FFFFFF" stroke-width="12"/>
                <line x1="50" y1="60" x2="170" y2="60" stroke="#FF9F0A" stroke-width="16"/>
                <line x1="50" y1="110" x2="80" y2="110" stroke="#FFFFFF" stroke-width="12"/>
                <line x1="110" y1="110" x2="140" y2="110" stroke="#FFFFFF" stroke-width="12"/>
                <line x1="170" y1="110" x2="170" y2="160" stroke="#FF9F0A" stroke-width="16"/>
                <line x1="50" y1="160" x2="80" y2="160" stroke="#FFFFFF" stroke-width="12"/>
                <line x1="110" y1="160" x2="140" y2="160" stroke="#FFFFFF" stroke-width="12"/>
              </g>
            </svg>
        </div>

        <!-- Main Complete Calculator Interface -->
        <div class="calculator-wrapper">
            <!-- Header buttons -->
            <div class="header-bar">
                <!-- تم إصلاح الوسم التالف هنا ودمج أيقونة صغيرة متناسقة داخله -->
                <button class="header-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                      <circle cx="256" cy="256" r="240" fill="#1C1C1E"/>
                      <g transform="translate(146, 146)" stroke="#FF9F0A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="0" y="0" width="220" height="220" rx="30" fill="none" stroke="#FFFFFF" stroke-width="12"/>
                        <line x1="50" y1="60" x2="170" y2="60" stroke="#FF9F0A" stroke-width="16"/>
                        <line x1="170" y1="110" x2="170" y2="160" stroke="#FF9F0A" stroke-width="16"/>
                      </g>
                    </svg>
                </button>
                <button class="header-btn" id="minimize-btn" onclick="toggleMinimize(event)">✖️</button>
            </div>

            <!-- Display -->
            <div class="display-screen">
                <div class="expression" id="display-view">0</div>
            </div>

            <!-- Buttons Layout Matching 22219_2.png structure exactly -->
            <div class="grid-container">
                <!-- Row 1 -->
                <button class="btn btn-sci" onclick="input('(')">(</button>
                <button class="btn btn-sci" onclick="input(')')">)</button>
                <button class="btn btn-sci" onclick="clearMemory()">mc</button>
                <button class="btn btn-sci" onclick="addToMemory()">m+</button>
                <button class="btn btn-sci" onclick="subtractFromMemory()">m-</button>
                <button class="btn btn-sci" onclick="recallMemory()">mr</button>

                <!-- Row 2 -->
                <button class="btn btn-sci" onclick="toggle2nd()">2nd</button>
                <button class="btn btn-sci" onclick="input('²')">x²</button>
                <button class="btn btn-sci" onclick="input('³')">x³</button>
                <button class="btn btn-sci" onclick="input('^')">xʸ</button>
                <button class="btn btn-sci" onclick="input('e^')">eˣ</button>
                <button class="btn btn-sci" onclick="input('10^')">10ˣ</button>

                <!-- Row 3 -->
                <button class="btn btn-sci" onclick="input('1/')">1/x</button>
                <button class="btn btn-sci" onclick="input('√')">²√x</button>
                <button class="btn btn-sci" onclick="input('³√')">³√x</button>
                <button class="btn btn-sci" onclick="input('ʸ√')">ʸ√x</button>
                <button class="btn btn-sci" onclick="input('ln(')">ln</button>
                <button class="btn btn-sci" onclick="input('log(')">log₁₀</button>

                <!-- Row 4 -->
                <button class="btn btn-sci" onclick="factorial()">x!</button>
                <button class="btn btn-sci" onclick="input('sin(')">sin</button>
                <button class="btn btn-sci" onclick="input('cos(')">cos</button>
                <button class="btn btn-sci" onclick="input('tan(')">tan</button>
                <button class="btn btn-sci" onclick="input('e')">e</button>
                <button class="btn btn-sci" onclick="input('EE')">EE</button>

                <!-- Row 5 -->
                <button class="btn btn-sci" onclick="input('Rand')">Rand</button>
                <button class="btn btn-sci" onclick="input('sinh(')">sinh</button>
                <button class="btn btn-sci" onclick="input('cosh(')">cosh</button>
                <button class="btn btn-sci" onclick="input('tanh(')">tanh</button>
                <button class="btn btn-sci" onclick="input('π')">π</button>
                <button class="btn btn-sci" onclick="toggleRadDeg()">Rad</button>

                <!-- Row 6 -->
                <button class="btn btn-action" onclick="backspace()">⌫</button>
                <button class="btn btn-action" onclick="clearAll()">C</button>
                <button class="btn btn-action" onclick="input('%')">%</button>
                <button class="btn btn-op span-3" onclick="input('÷')">÷</button>

                <!-- Row 7 -->
                <button class="btn btn-num" onclick="input('7')">7</button>
                <button class="btn btn-num" onclick="input('8')">8</button>
                <button class="btn btn-num" onclick="input('9')">9</button>
                <button class="btn btn-op span-3" onclick="input('×')">×</button>

                <!-- Row 8 -->
                <button class="btn btn-num" onclick="input('4')">4</button>
                <button class="btn btn-num" onclick="input('5')">5</button>
                <button class="btn btn-num" onclick="input('6')">6</button>
                <button class="btn btn-op span-3" onclick="input('-')">−</button>

                <!-- Row 9 -->
                <button class="btn btn-num" onclick="input('1')">1</button>
                <button class="btn btn-num" onclick="input('2')">2</button>
                <button class="btn btn-num" onclick="input('3')">3</button>
                <button class="btn btn-op span-3" onclick="input('+')">+</button>

                <!-- Row 10 -->
                <button class="btn btn-num" onclick="changeSign()">+/-</button>
                <button class="btn btn-num" onclick="input('0')">0</button>
                <button class="btn btn-num" onclick="input('.')">.</button>
                <button class="btn btn-op span-3" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script>
        let displayValue = "";
        let isMinimized = false;
        let memory = 0;

        const displayElement = document.getElementById('display-view');
        const appContainer = document.getElementById('app-container');

        function input(char) {
            if (displayValue === "0" && char !== '.') {
                displayValue = char;
            } else {
                displayValue += char;
            }
            updateDisplay();
        }

        function clearAll() {
            displayValue = "0";
            updateDisplay();
        }

        function backspace() {
            if (displayValue.length > 1) {
                displayValue = displayValue.slice(0, -1);
            } else {
                displayValue = "0";
            }
            updateDisplay();
        }

        function updateDisplay() {
            displayElement.innerText = displayValue || "0";
        }

        function changeSign() {
            if(displayValue !== "0" && displayValue !== "") {
                if(displayValue.startsWith("-")) {
                    displayValue = displayValue.substring(1);
                } else {
                    displayValue = "-" + displayValue;
                }
                updateDisplay();
            }
        }

        function factorial() {
            let num = parseFloat(displayValue);
            if (num < 0) { displayValue = "Error"; updateDisplay(); return; }
            let fact = 1;
            for (let i = 1; i <= num; i++) fact *= i;
            displayValue = String(fact);
            updateDisplay();
        }

        function calculate() {
            try {
                let processValue = displayValue
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/π/g, 'Math.PI')
                    .replace(/e/g, 'Math.E')
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/√/g, 'Math.sqrt(');
                
                if(processValue.includes('²')) processValue = processValue.replace(/(\d+)²/g, 'Math.pow($1,2)');
                if(processValue.includes('³')) processValue = processValue.replace(/(\d+)³/g, 'Math.pow($1,3)');

                let result = eval(processValue);
                displayValue = String(result);
                updateDisplay();
            } catch (error) {
                displayValue = "Error";
                updateDisplay();
            }
        }

        function clearMemory() { memory = 0; }
        function recallMemory() { displayValue = String(memory); updateDisplay(); }
        function addToMemory() { calculate(); memory += parseFloat(displayValue) || 0; }
        function subtractFromMemory() { calculate(); memory -= parseFloat(displayValue) || 0; }

        function toggleMinimize(event) {
            if (event) event.stopPropagation();
            isMinimized = !isMinimized;
            if (isMinimized) {
                appContainer.className = "minimized";
                appContainer.style.top = "80px";
                appContainer.style.left = "20px";
            } else {
                appContainer.className = "maximized";
                appContainer.style.top = "0";
                appContainer.style.left = "0";
            }
        }

        appContainer.addEventListener('click', function() {
            if (isMinimized) toggleMinimize();
        });

        let offsetX, offsetY;
        appContainer.addEventListener('touchstart', function(e) {
            if (!isMinimized) return;
            let touch = e.touches[0];
            offsetX = touch.clientX - appContainer.getBoundingClientRect().left;
            offsetY = touch.clientY - appContainer.getBoundingClientRect().top;
        }, {passive: true});

        appContainer.addEventListener('touchmove', function(e) {
            if (!isMinimized) return;
            let touch = e.touches[0];
            let x = touch.clientX - offsetX;
            let y = touch.clientY - offsetY;

            if (x < 0) x = 0;
            if (y < 0) y = 0;
            if (x > window.innerWidth - 60) x = window.innerWidth - 60;
            if (y > window.innerHeight - 60) y = window.innerHeight - 60;

            appContainer.style.left = x + 'px';
            appContainer.style.top = y + 'px';
            e.preventDefault();
        }, {passive: false});
    </script>
</body>
</html>
